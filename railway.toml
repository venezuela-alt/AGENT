[build]
builder = "DOCKERFILE"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[volumes]]
mountPath = "/opt/data"

[variables]
HERMES_HOME = { required = false, description = "Data path, default /opt/data" }

# --- Fireworks AI ---
OPENAI_API_KEY = { required = true, description = "agentrouter.org (sk_...) dari agentrouter.org" }
OPENAI_BASE_URL = { required = true, description = "https://agentrouter.org/v1" }
HERMES_MODEL = { required = true, description = "accounts/agentrouter.org/models/llama-v3p3-70b-instruct" }

# --- Telegram ---
TELEGRAM_BOT_TOKEN = { required = true, description = "Token dari @BotFather" }
TELEGRAM_ALLOWED_USERS = { required = false, description = "User ID Telegram, kosong = semua boleh" }
TELEGRAM_HOME_CHANNEL = { required = false, description = "User ID lo sendiri — wajib diisi biar bot gak diem" }

# --- Dashboard (opsional) ---
HERMES_DASHBOARD = { required = false, description = "Set 1 kalau mau WebUI" }
HERMES_DASHBOARD_BASIC_AUTH_USERNAME = { required = false, description = "Wajib diisi KALAU HERMES_DASHBOARD=1" }
HERMES_DASHBOARD_BASIC_AUTH_PASSWORD = { required = false, description = "Wajib diisi KALAU HERMES_DASHBOARD=1" }
