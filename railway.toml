[build]
builder = "DOCKERFILE"

[deploy]
restartPolicyType = "always"
healthcheckPath = "/health"
healthcheckTimeout = 60

[[volumes]]
mountPath = "/opt/data"

[variables]
HERMES_HOME = { required = false, description = "Path data Hermes" }
HERMES_DASHBOARD = { required = false, description = "Set 1 untuk enable WebUI dashboard" }
