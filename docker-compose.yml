version: '3.8'

services:
  hermes-agent:
    build: .
    container_name: hermes-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_API_KEY_2=${GROQ_API_KEY_2}
      - GROQ_API_KEY_3=${GROQ_API_KEY_3}
    restart: unless-stopped
    volumes:
      - hermes_data:/root/.hermes
    stdin_open: true
    tty: true

volumes:
  hermes_data:
    driver: local
